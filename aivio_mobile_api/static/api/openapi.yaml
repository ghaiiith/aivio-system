openapi: 3.0.3
info:
  title: AIVIO Odoo 19 Community Mobile API
  version: 1.0.0
  description: REST API for Resident, Security, Maintenance, Billing, and Notifications
    apps.
servers:
- url: https://your-odoo-domain.com
  description: Odoo server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: AIVIO_TOKEN
  schemas:
    StandardResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
        errors:
          type: array
          items:
            type: object
    LoginRequest:
      type: object
      required:
      - login
      - password
      properties:
        login:
          type: string
        password:
          type: string
        device_token:
          type: string
    DeviceTokenRequest:
      type: object
      required:
      - device_token
      properties:
        device_token:
          type: string
        platform:
          type: string
          enum:
          - android
          - ios
          - web
        app_name:
          type: string
    VisitorRequest:
      type: object
      required:
      - visitor_name
      - valid_to
      properties:
        visitor_name:
          type: string
        visitor_phone:
          type: string
        visitor_count:
          type: integer
        unit_id:
          type: integer
        resident_id:
          type: integer
        valid_from:
          type: string
        valid_to:
          type: string
        has_car:
          type: boolean
        car_plate:
          type: string
    TicketRequest:
      type: object
      required:
      - subject
      - description
      properties:
        subject:
          type: string
        description:
          type: string
        unit_id:
          type: integer
        category_id:
          type: integer
        priority:
          type: string
        image:
          type: string
          description: base64 image
security:
- bearerAuth: []
paths:
  /api/auth/login:
    post:
      tags:
      - Authentication
      summary: Login
      security: []
      responses:
        '200':
          description: Standard response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
